<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 800px;
    height: 450px;
    overflow: hidden;
    background: #0c0c14;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Hintergrund rechts ──────────────────────────────────── */
  .bg-right {
    position: absolute;
    right: 0; top: 0;
    width: 530px; height: 450px;
    background: linear-gradient(135deg, #13132b 0%, #1c1648 45%, #0e0e1e 100%);
    clip-path: polygon(100px 0, 100% 0, 100% 100%, 0 100%);
  }

  /* Glow-Spots */
  .glow-1 {
    position: absolute;
    right: 100px; top: 40px;
    width: 320px; height: 270px;
    background: radial-gradient(ellipse, rgba(139,92,246,0.16) 0%, transparent 68%);
    border-radius: 50%;
    pointer-events: none;
  }
  .glow-2 {
    position: absolute;
    right: 230px; bottom: 30px;
    width: 210px; height: 160px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.10) 0%, transparent 68%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Editor-Mockup */
  .editor-mock {
    position: absolute;
    right: 32px;
    top: 50%;
    transform: translateY(-50%);
    filter: drop-shadow(0 24px 64px rgba(0,0,0,0.85));
  }

  /* Linker Overlay-Gradient */
  .overlay-left {
    position: absolute;
    left: 0; top: 0;
    width: 440px; height: 450px;
    background: linear-gradient(to right, #0c0c14 42%, rgba(12,12,20,0.85) 65%, transparent 100%);
    pointer-events: none;
  }

  /* ── Inhalt ──────────────────────────────────────────────── */
  .content {
    position: absolute;
    inset: 0;
    padding: 38px 48px;
    display: flex;
    flex-direction: column;
  }

  /* Wordmark oben */
  .wordmark {
    display: flex;
    align-items: center;
    gap: 9px;
    opacity: 0.55;
  }
  .wm-icon {
    width: 24px; height: 24px;
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 900; color: white; letter-spacing: -0.5px;
  }
  .wm-text {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
  }

  .spacer { flex: 1; }

  /* App-Titel */
  .app-title {
    font-size: 60px;
    font-weight: 700;
    letter-spacing: -2.5px;
    line-height: 1;
    margin-bottom: 5px;
  }

  .app-version {
    font-size: 24px;
    font-weight: 300;
    color: rgba(255,255,255,0.38);
    margin-bottom: 30px;
  }

  /* Ladezeile */
  .loading-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .loading-dot {
    width: 5px; height: 5px;
    background: #8b5cf6;
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(0.75); }
    50%       { opacity: 1;    transform: scale(1.2); }
  }
  .loading-text {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #a78bfa;
  }

  /* Ladebalken */
  .progress-bar-wrap {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7c3aed, #a78bfa, #6366f1);
    border-radius: 2px;
    animation: loadbar 10s cubic-bezier(0.1, 0.05, 0.3, 1) forwards;
  }
  @keyframes loadbar {
    0%   { width: 0%; }
    60%  { width: 75%; }
    85%  { width: 90%; }
    100% { width: 100%; }
  }

  /* Copyright */
  .copyright {
    font-size: 7.5px;
    color: rgba(255,255,255,0.18);
    line-height: 1.7;
  }

  /* Label unten rechts */
  .label-br {
    position: absolute;
    bottom: 36px; right: 46px;
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
  }
</style>
</head>
<body>

<!-- Hintergrund -->
<div class="bg-right"></div>
<div class="glow-1"></div>
<div class="glow-2"></div>

<!-- Editor-Mockup SVG -->

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">

  <!-- Fenster-Hintergrund -->

  <!-- Fake Bildschirm-Inhalt -->

  <rect x="20" y="65" width="145" height="7" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="20" y="80" width="268" height="65" rx="4" fill="rgba(255,255,255,0.025)"/>
  <rect x="20" y="156" width="185" height="5" rx="2" fill="rgba(255,255,255,0.025)"/>

  <!-- Zoom-Effekt auf Video -->

  <circle cx="157" cy="127" r="52" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.45"/>
  <circle cx="157" cy="127" r="30" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.65"/>
  <circle cx="157" cy="127" r="5"  fill="#8b5cf6" opacity="0.9"/>
  <line x1="157" y1="115" x2="157" y2="104" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="157" y1="139" x2="157" y2="150" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="145" y1="127" x2="134" y2="127" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="169" y1="127" x2="180" y2="127" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>

  <!-- Timeline -->
  <rect x="8" y="228" width="296" height="60" rx="5" fill="#0e0e1a"/>
  <rect x="8" y="228" width="296" height="18" rx="4" fill="#141420"/>
  <rect x="8" y="238" width="296" height="8" fill="#141420"/>

  <!-- Thumbnail-Strip -->
  <rect x="14" y="250" width="284" height="32" rx="3" fill="rgba(255,255,255,0.025)"/>
  <rect x="14" y="250" width="46" height="32" rx="2" fill="rgba(255,255,255,0.03)"/>
  <rect x="62" y="250" width="46" height="32" rx="2" fill="rgba(255,255,255,0.025)"/>
  <rect x="110" y="250" width="46" height="32" rx="2" fill="rgba(255,255,255,0.035)"/>
  <rect x="158" y="250" width="46" height="32" rx="2" fill="rgba(255,255,255,0.028)"/>

  <!-- Zoom-Regionen auf Timeline -->
  <rect x="60"  y="253" width="44" height="26" rx="3" fill="rgba(139,92,246,0.55)"/>
  <rect x="104" y="253" width="88" height="26" rx="3" fill="rgba(139,92,246,0.20)"/>
  <rect x="206" y="253" width="44" height="26" rx="3" fill="rgba(139,92,246,0.50)"/>

  <!-- Playhead -->
  <line x1="136" y1="228" x2="136" y2="288" stroke="rgba(167,139,250,0.85)" stroke-width="1.5"/>
  <polygon points="131,228 141,228 136,235" fill="rgba(167,139,250,0.85)"/>

  <!-- Event-Marker -->
  <circle cx="82"  cy="267" r="5" fill="#8b5cf6" stroke="#c4b5fd" stroke-width="1.5"/>
  <circle cx="228" cy="267" r="5" fill="#8b5cf6" stroke="#c4b5fd" stroke-width="1.5"/>
  <circle cx="192" cy="267" r="5" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>

  <!-- Rechtes Panel -->
  <rect x="312" y="38" width="110" height="250" rx="5" fill="#0f0f1b"/>

  <!-- Panel-Tabs -->
  <rect x="312" y="38" width="110" height="26" rx="5" fill="#16162a"/>
  <rect x="312" y="52" width="110" height="12" fill="#16162a"/>
  <rect x="317" y="42" width="30" height="14" rx="3" fill="#7c3aed" opacity="0.85"/>
  <rect x="351" y="42" width="30" height="14" rx="3" fill="rgba(255,255,255,0.05)"/>
  <rect x="385" y="42" width="30" height="14" rx="3" fill="rgba(255,255,255,0.05)"/>

  <!-- Sliders im Panel -->
  <text x="317" y="80" font-size="6" fill="rgba(255,255,255,0.3)" font-family="system-ui">ABSTAND</text>

  <rect x="317" y="84" width="62" height="3" rx="1.5" fill="#7c3aed" opacity="0.7"/>
  <circle cx="379" cy="85.5" r="4" fill="#a78bfa"/>

  <text x="317" y="100" font-size="6" fill="rgba(255,255,255,0.3)" font-family="system-ui">ABRUNDUNG</text>
  <rect x="317" y="104" width="98" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="317" y="104" width="35" height="3" rx="1.5" fill="#7c3aed" opacity="0.7"/>

  <rect x="317" y="124" width="98" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="317" y="124" width="78" height="3" rx="1.5" fill="#7c3aed" opacity="0.7"/>
  <circle cx="395" cy="125.5" r="4" fill="#a78bfa"/>

  <!-- Farbfelder -->
  <text x="317" y="144" font-size="6" fill="rgba(255,255,255,0.3)" font-family="system-ui">HINTERGRUND</text>
  <rect x="317" y="148" width="22" height="16" rx="3" fill="#667eea"/>
  <rect x="342" y="148" width="22" height="16" rx="3" fill="#f093fb"/>
  <rect x="367" y="148" width="22" height="16" rx="3" fill="#43e97b"/>
  <rect x="392" y="148" width="22" height="16" rx="3" fill="#fa709a"/>
  <rect x="317" y="168" width="22" height="16" rx="3" fill="#4facfe"/>
  <rect x="342" y="168" width="22" height="16" rx="3" fill="#30cfd0"/>
  <rect x="367" y="168" width="22" height="16" rx="3" fill="#a18cd1"/>
  <rect x="392" y="168" width="22" height="16" rx="3" fill="#ff9a9e"/>

  <!-- Export-Button -->
  <rect x="317" y="268" width="98" height="16" rx="5" fill="#7c3aed" opacity="0.85"/>
  <text x="366" y="279" font-size="7" fill="white" text-anchor="middle" font-weight="700" font-family="system-ui">EXPORT</text>
</svg>

<!-- Overlay-Gradient links -->
<div class="overlay-left"></div>

<!-- Inhalte -->
<div class="content">
  <div class="wordmark">
    <div class="wm-icon">ZC</div>
    <div class="wm-text">ZoomCast Studio</div>
  </div>

  <div class="spacer"></div>

  <div class="app-title">ZoomCast</div>
  <div class="app-version">1.0</div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill"></div>
  </div>

  <div class="loading-row">
    <div class="loading-dot"></div>

  <div class="copyright">

  </div>
</div>

<div class="label-br">ZoomCast Screen Recorder</div>

</body>
</html>
